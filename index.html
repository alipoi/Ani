<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番组日历</title>
<link rel="stylesheet" href="/style.css?v=2">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0071e3">
</head>
<body>

<div class="bg"></div>

<header class="header">
  <div class="header-inner">
    <h1 class="logo">番组日历</h1>
    <p class="logo-sub">新番资讯 · 每日追番</p>
  </div>
</header>

  <div class="toolbar">
  <div class="toolbar-row">
    <button id="prevSeason" class="nav-btn" title="上一季">‹</button>
    <select id="yearSelect" class="sel"></select>
    <span class="sel-sep">年</span>
    <select id="seasonSelect" class="sel">
      <option value="winter">冬季</option>
      <option value="spring">春季</option>
      <option value="summer">夏季</option>
      <option value="fall">秋季</option>
    </select>
    <button id="nextSeason" class="nav-btn" title="下一季">›</button>
    <button class="today-btn" id="gotoToday">今天</button>
    <div class="search-bar">
      <input type="text" id="searchInput" class="search-input" placeholder="搜索番剧...">
      <button id="searchClear" class="search-clear">&times;</button>
    </div>
  </div>
</div>

<main class="main">
  <div id="list" class="list"></div>
  <div id="loading" class="loading">加载中...</div>
  <div id="empty" class="empty">暂无数据</div>
</main>

<footer class="footer">
  <p>番组日历 · 数据编辑于 <code>data/</code> 目录</p>
</footer>

<div id="overlay" class="overlay">
  <div class="overlay-inner">
    <button class="overlay-close" id="overlayClose">&times;</button>
    <div id="overlayContent"></div>
  </div>
</div>

<script>var _DATA = {};</script>
<script src="/script.js?v=3"></script>
</body>
</html>
