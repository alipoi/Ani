<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番组日历</title>
<link rel="stylesheet" href="/style.css?v=4">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0071e3">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1 class="logo">番组日历</h1>
    <div class="nav-row">
      <select id="yearSelect"></select>
      <span class="nav-sep">年</span>
      <select id="seasonSelect"></select>
      <input type="text" id="searchInput" class="search-input" placeholder="搜索番剧...">
    </div>
  </div>
</header>

<main class="main">
  <div id="loading" class="loading">加载中...</div>
  <div id="list" class="list"></div>
  <div id="empty" class="empty">暂无数据</div>
</main>

<div id="overlay" class="overlay">
  <div class="overlay-inner">
    <button class="overlay-close" id="overlayClose">&times;</button>
    <div id="overlayContent"></div>
  </div>
</div>

<script src="/script.js?v=7"></script>
</body>
</html>
